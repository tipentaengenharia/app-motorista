<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh;padding-top:env(safe-area-inset-top)}
/* ── Header ── */
.app-header{background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);color:#fff;padding:14px 18px 12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.3);position:sticky;top:0;z-index:50}
.app-header img{width:36px;height:36px;object-fit:contain}
.app-header-text h1{font-size:15px;font-weight:800;color:#29ABE2;letter-spacing:.5px}
.app-header-text p{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.header-right{margin-left:auto;text-align:right}
.header-date{font-size:12px;color:rgba(255,255,255,.7);font-weight:600}
.header-time{font-size:11px;color:rgba(255,255,255,.45)}
/* ── Screen wrapper ── */
.screen{padding:20px 16px;max-width:480px;margin:0 auto;min-height:calc(100vh - 64px)}
/* ── Cards ── */
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title span{width:3px;height:16px;background:#29ABE2;border-radius:2px;display:inline-block}
/* ── Welcome ── */
.welcome-logo{text-align:center;padding:32px 0 20px}
.welcome-logo img{width:110px;margin-bottom:12px}
.welcome-logo h2{font-size:20px;font-weight:800;color:#1a1a2e}
.welcome-logo p{color:#64748b;font-size:14px;margin-top:4px}
/* ── Driver buttons ── */
.driver-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.driver-btn{background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:16px 12px;font-size:14px;font-weight:700;color:#1a1a2e;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
.driver-btn:hover,.driver-btn:active{border-color:#29ABE2;background:#eff9fe;color:#1a8ec8}
.driver-btn .icon{font-size:22px;display:block;margin-bottom:6px}
/* ── Form inputs ── */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:15px;color:#1a1a2e;background:#fff;outline:none;transition:border .2s;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus{border-color:#29ABE2;box-shadow:0 0 0 3px rgba(41,171,226,.12)}
.form-group input[readonly]{background:#f8fafc;color:#64748b}
.cpf-big{font-size:22px!important;letter-spacing:3px;text-align:center;font-weight:700}
/* ── Fuel gauge ── */
.fuel-gauge{background:#f8fafc;border-radius:12px;padding:14px 12px}
.fuel-gauge-label{font-size:11.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;text-align:center}
.fuel-levels{display:flex;gap:6px;margin-bottom:8px}
.fuel-btn{flex:1;padding:10px 4px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:700;color:#94a3b8;background:#fff;cursor:pointer;transition:all .15s;text-align:center}
.fuel-btn:active{transform:scale(.96)}
.fuel-btn.active{border-color:#29ABE2;background:#29ABE2;color:#fff;box-shadow:0 2px 8px rgba(41,171,226,.4)}
.gauge-track{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ef4444,#f59e0b 40%,#22c55e);transition:width .3s ease}
.gauge-icons{display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-top:4px;padding:0 2px}
/* ── Vehicle cards ── */
.vehicle-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.vehicle-card{background:#fff;border:2.5px solid #e2e8f0;border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .15s}
.vehicle-card:active{transform:scale(.97)}
.vehicle-card.selected,.vehicle-card:hover{border-color:#29ABE2;background:#eff9fe}
.vehicle-emoji{font-size:42px;display:block;margin-bottom:8px}
.vehicle-name{font-size:16px;font-weight:800;color:#1a1a2e}
.vehicle-plate{font-size:12px;color:#64748b;margin-top:3px;font-weight:600;background:#f1f5f9;padding:3px 8px;border-radius:6px;display:inline-block}
/* ── Routes table ── */
.route-row{display:grid;grid-template-columns:1fr 72px 90px 34px;gap:6px;align-items:center;margin-bottom:8px}
.route-num{font-size:12px;font-weight:700;color:#94a3b8;text-align:center}
.route-input{border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 10px;font-size:13px;color:#1a1a2e;background:#fff;outline:none;width:100%;transition:border .2s}
.route-input:focus{border-color:#29ABE2}
.route-input.time{background:#f8fafc;color:#64748b;font-weight:700;font-size:12px;text-align:center;cursor:default}
.route-input.km{text-align:center;font-weight:700}
.btn-del{width:30px;height:30px;border:none;background:#fee2e2;color:#dc2626;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.btn-add-route{width:100%;padding:10px;border:2px dashed #29ABE2;border-radius:10px;background:transparent;color:#29ABE2;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-add-route:hover{background:#eff9fe}
.route-header{display:grid;grid-template-columns:1fr 72px 90px 34px;gap:6px;margin-bottom:6px}
.route-header span{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;text-align:center}
.route-header span:first-child{text-align:left;padding-left:4px}
/* ── Toggle ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.toggle-label{font-size:15px;font-weight:600;color:#1a1a2e}
.toggle{position:relative;width:50px;height:27px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#e2e8f0;border-radius:27px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:21px;height:21px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:#29ABE2}
.toggle input:checked+.toggle-slider:before{transform:translateX(23px)}
/* ── Buttons ── */
.btn-primary{width:100%;padding:15px;background:#29ABE2;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(41,171,226,.35);margin-top:8px}
.btn-primary:hover{background:#1a96cc}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-secondary{width:100%;padding:12px;background:#f1f5f9;color:#475569;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-ghost{background:none;border:none;color:#64748b;font-size:13px;cursor:pointer;padding:8px;text-decoration:underline;display:block;margin:8px auto 0}
/* ── Badge / info ── */
.info-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.badge-info{background:#eff9fe;border:1px solid #bae6fd;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:#0369a1}
.badge-vehicle{background:#dcfce7;border:1px solid #bbf7d0;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:#15803d}
.badge-date{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:#b45309}
/* ── Success screen ── */
.success-screen{text-align:center;padding:60px 20px}
.success-icon{font-size:72px;margin-bottom:20px}
.success-screen h2{font-size:24px;font-weight:800;color:#15803d;margin-bottom:8px}
.success-screen p{color:#64748b;font-size:15px;margin-bottom:6px;line-height:1.6}
/* ── Divider ── */
.divider{height:1px;background:#f1f5f9;margin:4px 0 16px}
/* ── Error ── */
.error-msg{background:#fee2e2;border-radius:8px;padding:10px 14px;color:#dc2626;font-size:13px;font-weight:600;margin-top:-4px;margin-bottom:10px}
/* ── KM row ── */
.km-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* ── Step indicator ── */
.step-dots{display:flex;gap:6px;justify-content:center;margin:12px 0 4px}
.step-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;transition:.2s}
.step-dot.active{background:#29ABE2;width:20px;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUQg2vWTIXmP-IR20ra_qmhfPjL1POOBdQkCepuIZiezDeKIFafYMMR6ZFGWoiRTLshA/exec';
// Emojis conhecidos por placa (pode crescer conforme novos veículos são cadastrados)
const EMOJI_MAP = {'TRZ4A58':'🚗','TAF3J08':'🚙'};

// Lê dados do localStorage (salvos pelo sistema admin) — suporta formato antigo (string[]) e novo (objeto[])
const _rawCarros = (() => { try { return JSON.parse(localStorage.getItem('penta_carros')||'null'); } catch(e){return null;} })();
const _rawMotoristas = (() => { try { return JSON.parse(localStorage.getItem('penta_motoristas')||'null'); } catch(e){return null;} })();

// VEICULOS: array de {placa, nome, emoji}
const VEICULOS = (() => {
  const defaults = [
    {placa:'TRZ4A58', nome:'Mobi',    emoji:'🚗'},
    {placa:'TAF3J08', nome:'Montana', emoji:'🚙'},
  ];
  if (!_rawCarros || !_rawCarros.length) return defaults;
  return _rawCarros.map(x => {
    if (typeof x === 'string') return {placa:x, nome:x, emoji: EMOJI_MAP[x]||'🚙'};
    return {placa:x.placa, nome:x.nome||x.placa, emoji: EMOJI_MAP[x.placa]||'🚙'};
  });
})();

// MOTORISTAS: array de nomes (para o seletor) + MOTORISTAS_CPF: mapa nome→cpf (para validação)
const _motDefaults = [
  {nome:'CAMILA',         cpf:'00748152296'},
  {nome:'DILERMANDO',     cpf:'03601744260'},
  {nome:'FELIPE',         cpf:'97901504234'},
  {nome:'JEAN',           cpf:'02297749201'},
  {nome:'JEAN FRANCISCO', cpf:''},
  {nome:'LEANDRO',        cpf:'70168231212'},
  {nome:'NETO',           cpf:'00744223245'},
];
const _motList = (_rawMotoristas && _rawMotoristas.length)
  ? _rawMotoristas.map(x => typeof x === 'string' ? {nome:x, cpf:''} : x)
  : _motDefaults;

const MOTORISTAS = _motList.map(m => m.nome);
const MOTORISTAS_CPF = Object.fromEntries(_motList.map(m => [m.nome, m.cpf||'']));
const FUEL_LEVELS = ['E','1/4','1/2','3/4','F'];
const FUEL_FILL  = {E:0,  '1/4':25, '1/2':50, '3/4':75, F:100};
const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const DRIVER_KEY = 'penta_driver_today';
const FORM_KEY   = 'penta_form_today';
const SESSAO_KEY = 'penta_sessao_id';

// ── helpers ──────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split('T')[0];
const nowTime  = () => new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const formatCPF = v => {
  const d = v.replace(/\D/g,'').slice(0,11);
  return d.replace(/(\d{3})(\d)/,'$1.$2')
          .replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3')
          .replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/,'$1.$2.$3-$4');
};

async function postRecord(data) {
  const res = await fetch(SCRIPT_URL, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action:'add', data})
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error||'Erro');
  return json;
}

const apiPost = async (payload) => {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Erro');
  return data.data;
};

// ── FuelGauge ─────────────────────────────────────────────────────────────────
function FuelGauge({value, onChange, label}) {
  const pct = value ? FUEL_FILL[value] : 0;
  return (
    <div className="fuel-gauge">
      <div className="fuel-gauge-label">⛽ {label}</div>
      <div className="fuel-levels">
        {FUEL_LEVELS.map(l => (
          <button key={l} type="button"
            className={`fuel-btn ${value===l?'active':''}`}
            onClick={()=>onChange(l)}>{l}</button>
        ))}
      </div>
      <div className="gauge-track">
        <div className="gauge-fill" style={{width: pct+'%'}} />
      </div>
      <div className="gauge-icons"><span>⬜ Vazio</span><span>🟩 Cheio</span></div>
    </div>
  );
}

// ── Sync Button ───────────────────────────────────────────────────────────────
function SyncButton() {
  const [status, setStatus] = useState('idle'); // idle | loading | ok | err

  const handleSync = () => {
    setStatus('loading');
    fetch(SCRIPT_URL + '?action=getConfig')
      .then(r => r.json())
      .then(d => {
        let changed = false;
        if (d.veiculos && d.veiculos.length && JSON.stringify(d.veiculos) !== localStorage.getItem('penta_carros')) {
          localStorage.setItem('penta_carros', JSON.stringify(d.veiculos));
          changed = true;
        }
        if (d.motoristas && d.motoristas.length && JSON.stringify(d.motoristas) !== localStorage.getItem('penta_motoristas')) {
          localStorage.setItem('penta_motoristas', JSON.stringify(d.motoristas));
          changed = true;
        }
        if (changed) {
          sessionStorage.setItem('cfg_synced', '1');
          window.location.reload();
        } else {
          setStatus('ok');
          setTimeout(() => setStatus('idle'), 2500);
        }
      })
      .catch(() => { setStatus('err'); setTimeout(() => setStatus('idle'), 2500); });
  };

  return (
    <div style={{textAlign:'center', marginTop:'12px'}}>
      <button
        onClick={handleSync}
        disabled={status === 'loading'}
        style={{background:'none', border:'1.5px solid #cbd5e1', borderRadius:'20px', padding:'7px 18px',
          fontSize:'13px', color:'#64748b', cursor:'pointer', display:'inline-flex', alignItems:'center', gap:'6px'}}>
        {status === 'loading' ? '⏳ Atualizando...' : status === 'ok' ? '✅ Já está atualizado' : status === 'err' ? '❌ Erro ao atualizar' : '🔄 Atualizar lista'}
      </button>
    </div>
  );
}

// ── Screen 2: Vehicle ─────────────────────────────────────────────────────────
function VehicleScreen({driverName, onDone, onBack, sessaoIniciada, onRetomar}) {
  const [sel, setSel] = useState('');
  const [checkingCar, setCheckingCar] = useState(false);
  const [carBloqueado, setCarBloqueado] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [driverBloqueado, setDriverBloqueado] = useState(null);
  const [checkingDriver, setCheckingDriver] = useState(false);

  // Check if driver already has an open session
  useEffect(() => {
    if (!driverName || sessaoIniciada) return;
    setCheckingDriver(true);
    fetch(SCRIPT_URL + '?action=checkDriverStatus&motorista=' + encodeURIComponent(driverName))
      .then(r => r.json())
      .then(res => {
        if (res.success && res.data && !res.data.livre) setDriverBloqueado(res.data);
      })
      .catch(() => {})
      .finally(() => setCheckingDriver(false));
  }, [driverName]);

  useEffect(() => {
    if (!sel || !driverName || sessaoIniciada) return;
    setCheckingCar(true);
    setCarBloqueado(null);
    const todayFormatted = new Date().toLocaleDateString('pt-BR');
    fetch(SCRIPT_URL + '?action=checkCarStatus&vtr=' + encodeURIComponent(sel) + '&data=' + encodeURIComponent(todayFormatted))
      .then(r => r.json())
      .then(res => {
        if (res.success && !res.data.livre) {
          setCarBloqueado(res.data);
        }
      })
      .catch(() => {})
      .finally(() => setCheckingCar(false));
  }, [sel, driverName]);

  const handleIniciarRota = async () => {
    setLoading(true); setError('');
    try {
      const today = new Date().toLocaleDateString('pt-BR');
      const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      const result = await apiPost({action:'iniciarSessao', data:{
        vtr: sel, motorista: driverName,
        data: today, hora,
        dados: {km_inicial: '', rotas: []}
      }});
      localStorage.setItem(SESSAO_KEY, result.sessaoId);
      onDone(sel, result.sessaoId);
    } catch(e) { setError('Erro ao iniciar rota: ' + e.message); }
    setLoading(false);
  };

  return (
    <div className="screen">
      <div style={{textAlign:'center',padding:'20px 0 16px'}}>
        <div style={{fontSize:'13px',fontWeight:'700',color:'#29ABE2',marginBottom:'4px'}}>
          👤 {driverName}
        </div>
        <h2 style={{fontSize:'20px',fontWeight:'800',color:'#1a1a2e'}}>Qual veículo hoje?</h2>
      </div>
      {checkingDriver && (
        <div style={{textAlign:'center',color:'#6b7280',fontSize:'13px',padding:'8px 0 4px'}}>Verificando rotas em aberto...</div>
      )}
      {driverBloqueado && (
        <div style={{background:'#fef2f2',border:'2px solid #ef4444',borderRadius:'12px',padding:'14px',marginBottom:'12px',textAlign:'center'}}>
          <div style={{fontSize:'20px',marginBottom:'6px'}}>🚫</div>
          <div style={{fontWeight:'800',color:'#dc2626',fontSize:'14px'}}>Você já tem uma rota em aberto</div>
          <div style={{color:'#7f1d1d',fontSize:'13px',marginTop:'4px'}}>Veículo {driverBloqueado.vtr} · iniciada às {driverBloqueado.horaInicio}</div>
          <div style={{color:'#7f1d1d',fontSize:'12px',marginTop:'4px'}}>Finalize a rota anterior antes de iniciar uma nova</div>
        </div>
      )}
      <div className="vehicle-grid">
        {VEICULOS.map(v => (
          <div key={v.placa} className={`vehicle-card ${sel===v.placa?'selected':''}`} onClick={()=>{setSel(v.placa);setCarBloqueado(null);}}>
            <span className="vehicle-emoji">{v.emoji}</span>
            <div className="vehicle-name">{v.nome}</div>
            <div className="vehicle-plate">{v.placa}</div>
          </div>
        ))}
      </div>
      {error && <div className="error-msg">⚠️ {error}</div>}
      {sessaoIniciada ? (
        <button className="btn-primary" onClick={onRetomar}
          style={{background:'#1e3a5f'}}>
          🔄 Retomar rota em andamento
        </button>
      ) : (
        sel && (
          checkingCar ? (
            <div style={{textAlign:'center',color:'#6b7280',fontSize:'13px',padding:'8px'}}>Verificando disponibilidade do carro...</div>
          ) : carBloqueado ? (
            <div style={{background:'#fef2f2',border:'2px solid #ef4444',borderRadius:'12px',padding:'14px',marginTop:'8px',textAlign:'center'}}>
              <div style={{fontSize:'20px',marginBottom:'6px'}}>🚫</div>
              <div style={{fontWeight:'800',color:'#dc2626',fontSize:'14px'}}>VTR {sel} está em uso</div>
              <div style={{color:'#7f1d1d',fontSize:'13px',marginTop:'4px'}}>
                Motorista {carBloqueado.motorista} iniciou às {carBloqueado.horaInicio}
              </div>
              <div style={{color:'#7f1d1d',fontSize:'12px',marginTop:'4px'}}>Aguarde a finalização ou contate o administrador</div>
            </div>
          ) : driverBloqueado ? null : (
            <button className="btn-primary" disabled={loading} onClick={handleIniciarRota}
              style={{background:'#059669'}}>
              {loading ? 'Iniciando...' : '🚗 Iniciar Rota'}
            </button>
          )
        )
      )}
      <button className="btn-ghost" onClick={onBack}>← Voltar</button>
      <div className="step-dots">
        <div className="step-dot"/>
        <div className="step-dot"/>
        <div className="step-dot active"/>
      </div>
    </div>
  );
}

// ── Screen 3: Form ────────────────────────────────────────────────────────────
function FormScreen({driverName, vehicle, onSubmit, onBack, onRestart}) {
  const veh = VEICULOS.find(v=>v.placa===vehicle)||{};

  const emptyForm = () => ({
    km_inicial:'',
    nivel_inicio:'', nivel_fim:'',
    abasteceu: false,
    km_abst:'', litros:'', preco_litro:'', valor_abast:'', posto:'',
    tipo_combustivel:'gasolina',
    nivel_abast_depois:'',
    rotas:[]
  });

  // Load persisted form or start fresh
  const [form, setFormRaw] = useState(()=>{
    try {
      const s = localStorage.getItem(FORM_KEY);
      if(s) {
        const p = JSON.parse(s);
        if(p.date===todayStr() && p.vehicle===vehicle && p.driver===driverName)
          return p.form;
      }
    } catch(e){}
    return emptyForm();
  });
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [finalizadoPorAdmin, setFinalizadoPorAdmin] = useState(false);

  const setForm = useCallback(updater => {
    setFormRaw(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      try { localStorage.setItem(FORM_KEY, JSON.stringify({date:todayStr(),vehicle,driver:driverName,form:next})); } catch(e){}
      return next;
    });
  }, [vehicle, driverName]);

  const syncRascunho = async (currentForm) => {
    const sid = localStorage.getItem(SESSAO_KEY);
    if (!sid) return;
    try {
      await apiPost({action:'atualizarSessao', data:{
        sessaoId: sid,
        dados: {
          km_inicial: currentForm.km_inicial,
          rotas: currentForm.rotas,
          nivel_inicio: currentForm.nivel_inicio,
          nivel_fim: currentForm.nivel_fim,
          abasteceu: currentForm.abasteceu ? 'SIM' : 'NÃO',
          tipo_combustivel: currentForm.abasteceu ? (currentForm.tipo_combustivel || 'gasolina') : '',
          posto: currentForm.posto,
          km_abst: currentForm.km_abst,
          valor_abast: currentForm.valor_abast,
          litros: currentForm.litros,
          vtr: vehicle,
          motorista: driverName,
          data: new Date().toLocaleDateString('pt-BR'),
          mes: (() => { const mn = ['','janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro']; return mn[new Date().getMonth() + 1] || ''; })()
        }
      }});
    } catch(e) { /* silent */ }
  };

  // Polling for admin finalization
  useEffect(() => {
    const sid = localStorage.getItem(SESSAO_KEY);
    if (!sid) return;
    const interval = setInterval(async () => {
      try {
        const res = await fetch(SCRIPT_URL + '?action=checkSessao&sessaoId=' + encodeURIComponent(sid));
        const data = await res.json();
        if (data.success && data.data && data.data.status === 'finalizada_admin') {
          setFinalizadoPorAdmin(true);
          localStorage.removeItem(SESSAO_KEY);
          localStorage.removeItem(FORM_KEY);
          localStorage.removeItem(DRIVER_KEY);
          clearInterval(interval);
        }
      } catch(e) {}
    }, 30000);
    return () => clearInterval(interval);
  }, []);

  const addRota = async () => {
    if (!navigator.geolocation) {
      setError('GPS não disponível neste dispositivo. Verifique as configurações do navegador.');
      return;
    }
    let lat = null, lng = null;
    try {
      const pos = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(resolve, reject, {enableHighAccuracy:true, timeout:15000, maximumAge:0})
      );
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
    } catch(e) {
      let msg = '📍 Não foi possível obter a localização GPS.';
      if (e.code === 1) msg = '📍 Permissão de localização negada. Habilite o GPS nas configurações do navegador e tente novamente.';
      else if (e.code === 2) msg = '📍 GPS indisponível no momento. Aguarde e tente novamente.';
      else if (e.code === 3) msg = '📍 Tempo esgotado ao obter GPS. Tente novamente.';
      setError(msg);
      return;
    }
    setForm(f => {
      const next = {...f, rotas:[...f.rotas, {id:Date.now(), hora:nowTime(), destino:'', km:'', lat, lng}]};
      setTimeout(() => {
        setForm(ff => { syncRascunho(ff); return ff; });
      }, 100);
      return next;
    });
  };
  const updateRota = (id, field, val) => {
    setForm(f => ({...f, rotas:f.rotas.map(r=>r.id===id?{...r,[field]:val}:r)}));
  };
  const delRota = id => {
    setForm(f => ({...f, rotas:f.rotas.filter(r=>r.id!==id)}));
  };

  const handleSubmit = async () => {
    if (!form.km_inicial) { setError('Informe o KM inicial'); return; }
    const ki = parseInt(form.km_inicial);
    setError(''); setSubmitting(true);

    const sid = localStorage.getItem(SESSAO_KEY);
    if (!sid) { setError('Sessão não encontrada. Reinicie o app.'); setSubmitting(false); return; }

    const routeKms = form.rotas.filter(r => r.km && !isNaN(parseInt(r.km))).map(r => parseInt(r.km));
    const kf = routeKms.length > 0 ? Math.max(...routeKms) : null;
    if (!kf) { setError('Registre ao menos uma rota com KM do hodômetro'); setSubmitting(false); return; }
    if (kf <= ki) { setError('O KM do hodômetro nas rotas deve ser maior que o KM inicial'); setSubmitting(false); return; }
    if (!form.nivel_inicio) { setError('Selecione o nível de combustível no início'); setSubmitting(false); return; }
    if (!form.nivel_fim) { setError('Selecione o nível de combustível no fim'); setSubmitting(false); return; }

    try {
      const today = new Date().toLocaleDateString('pt-BR');
      const mes = today.split('/')[1];
      const mesesNomes = ['','janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

      await apiPost({action:'finalizarSessao', data:{
        sessaoId: sid,
        formData: {
          vtr: vehicle, motorista: driverName, data: today,
          km_inicial: ki, km_final: kf, km_dia: kf - ki,
          nivel_inicio: form.nivel_inicio, nivel_fim: form.nivel_fim,
          abasteceu: form.abasteceu ? 'SIM' : 'NÃO',
          tipo_combustivel: form.abasteceu ? (form.tipo_combustivel || 'gasolina') : '',
          posto: form.posto,
          km_abst: form.km_abst || '', valor_abast: form.valor_abast || '',
          litros: form.litros || '', mes: mesesNomes[parseInt(mes)],
          rotas: form.rotas
        }
      }});

      localStorage.removeItem(SESSAO_KEY);
      localStorage.removeItem(FORM_KEY);
      onSubmit();
    } catch(e) {
      setError('Erro ao enviar: '+e.message+'. Verifique sua conexão.');
    } finally { setSubmitting(false); }
  };

  return (
    <div style={{paddingBottom:'20px'}}>
      <div className="screen" style={{paddingTop:'16px'}}>
        {finalizadoPorAdmin && (
          <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
            <div style={{background:'white',borderRadius:'16px',padding:'28px 24px',maxWidth:'360px',width:'100%',textAlign:'center',boxShadow:'0 8px 32px rgba(0,0,0,0.3)'}}>
              <div style={{fontSize:'48px',marginBottom:'12px'}}>🔔</div>
              <div style={{fontWeight:'800',color:'#92400e',fontSize:'18px',marginBottom:'8px'}}>Rota Finalizada pelo Administrador</div>
              <div style={{color:'#78350f',fontSize:'14px',lineHeight:'1.5',marginBottom:'20px'}}>Sua rota foi encerrada remotamente pelo administrador. O carro foi liberado para outro motorista.</div>
              <button onClick={() => {
                setFinalizadoPorAdmin(false);
                setForm(emptyForm());
                setError('');
                if (onRestart) onRestart();
              }} style={{width:'100%',background:'#f59e0b',color:'white',border:'none',borderRadius:'10px',padding:'14px',fontWeight:'800',fontSize:'16px',cursor:'pointer'}}>
                OK, Entendido
              </button>
            </div>
          </div>
        )}
        {/* Info row */}
        <div className="info-row">
          <span className="badge-info">👤 {driverName.split(' ')[0]}</span>
          <span className="badge-vehicle">{veh.emoji} {veh.nome} · {vehicle}</span>
          <span className="badge-date">📅 {new Date().toLocaleDateString('pt-BR')}</span>
        </div>

        {/* KM */}
        <div className="card">
          <div className="card-title"><span/>KM Odômetro</div>
          {(()=>{
            const routeKms = form.rotas.filter(r=>r.km&&!isNaN(parseInt(r.km))).map(r=>parseInt(r.km));
            const kf = routeKms.length>0 ? Math.max(...routeKms) : null;
            const ki = parseInt(form.km_inicial)||0;
            return (<>
              <div className="km-row">
                <div className="form-group">
                  <label>KM Inicial (hodômetro)</label>
                  <input type="number" inputMode="numeric" value={form.km_inicial}
                    onChange={e=>setForm(f=>({...f,km_inicial:e.target.value}))} placeholder="Ex: 15000"/>
                </div>
                <div className="form-group">
                  <label>KM Final (automático)</label>
                  {kf
                    ? <div style={{border:'1.5px solid #bbf7d0',borderRadius:'8px',padding:'9px 10px',fontSize:'14px',fontWeight:'800',color:'#059669',background:'#f0fdf4',textAlign:'center'}}>
                        {kf.toLocaleString('pt-BR')} km ✅
                      </div>
                    : <div style={{border:'1.5px dashed #e2e8f0',borderRadius:'8px',padding:'9px 10px',fontSize:'12px',color:'#94a3b8',textAlign:'center',lineHeight:'1.4'}}>
                        Calculado a partir<br/>das rotas abaixo
                      </div>
                  }
                </div>
              </div>
              {kf && ki && kf>ki &&
                <div style={{background:'#f0fdf4',borderRadius:'8px',padding:'8px 12px',fontSize:'13px',fontWeight:'700',color:'#15803d',textAlign:'center'}}>
                  ✅ {(kf-ki).toLocaleString('pt-BR')} km rodados hoje
                </div>
              }
            </>);
          })()}
        </div>

        {/* Fuel start */}
        <div className="card">
          <div className="card-title"><span/>Nível de Combustível — Início do Dia</div>
          <FuelGauge value={form.nivel_inicio} onChange={v=>setForm(f=>({...f,nivel_inicio:v}))} label="Como estava ao pegar o veículo"/>
        </div>

        {/* Routes */}
        <div className="card">
          <div className="card-title"><span/>Rotas do Dia</div>
          {form.rotas.length > 0 && (
            <div className="route-header">
              <span>Saída / Destino</span>
              <span>Hora</span>
              <span>Hodôm.</span>
              <span/>
            </div>
          )}
          {form.rotas.map((r,i) => (
            <div key={r.id} className="route-row">
              <input className="route-input" type="text" placeholder={`Destino ${i+1}`}
                value={r.destino} onChange={e=>updateRota(r.id,'destino',e.target.value)}/>
              <input className="route-input time" type="text" value={r.hora} readOnly/>
              <input className="route-input km" type="number" inputMode="numeric"
                placeholder="Hodôm." value={r.km} onChange={e=>updateRota(r.id,'km',e.target.value)}/>
              <button className="btn-del" onClick={()=>delRota(r.id)}>×</button>
            </div>
          ))}
          <button className="btn-add-route" onClick={addRota}>
            + Registrar Saída / Chegada
          </button>
          <p style={{fontSize:'11px',color:'#94a3b8',textAlign:'center',marginTop:'8px'}}>
            🔒 Horário automático · Digite o KM do hodômetro ao chegar em cada local
          </p>
        </div>

        {/* Fueling toggle */}
        <div className="card">
          <div className="card-title"><span/>Abastecimento</div>
          <div className="toggle-row">
            <span className="toggle-label">Abasteceu hoje?</span>
            <label className="toggle">
              <input type="checkbox" checked={form.abasteceu}
                onChange={e=>setForm(f=>({...f,abasteceu:e.target.checked}))}/>
              <span className="toggle-slider"/>
            </label>
          </div>
          {form.abasteceu && (
            <>
              <div className="divider"/>
              {/* Tipo de combustível */}
              <div style={{marginBottom:'12px'}}>
                <label style={{fontSize:'13px',fontWeight:'600',color:'#6b7280',display:'block',marginBottom:'8px'}}>Tipo de Combustível</label>
                <div style={{display:'flex',gap:'10px'}}>
                  {[{val:'gasolina',label:'⛽ Gasolina',bg:'#fef2f2',border:'#fca5a5',color:'#dc2626',activeBg:'#dc2626',activeColor:'white'},
                    {val:'alcool',label:'🌿 Álcool',bg:'#f0fdf4',border:'#86efac',color:'#16a34a',activeBg:'#16a34a',activeColor:'white'}
                  ].map(opt => (
                    <button key={opt.val} onClick={() => setForm(f=>({...f,tipo_combustivel:opt.val}))}
                      style={{flex:1,padding:'10px 8px',borderRadius:'10px',fontWeight:'700',fontSize:'14px',cursor:'pointer',
                        border: `2px solid ${form.tipo_combustivel===opt.val ? opt.activeBg : opt.border}`,
                        background: form.tipo_combustivel===opt.val ? opt.activeBg : opt.bg,
                        color: form.tipo_combustivel===opt.val ? opt.activeColor : opt.color,
                        transition:'all 0.15s'
                      }}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
              <div className="km-row">
                <div className="form-group">
                  <label>KM no abast.</label>
                  <input type="number" inputMode="numeric" value={form.km_abst}
                    onChange={e=>setForm(f=>({...f,km_abst:e.target.value}))} placeholder="Ex: 15060"/>
                </div>
                <div className="form-group">
                  <label>Litros</label>
                  <input type="number" inputMode="decimal" step="0.01" value={form.litros}
                    onChange={e=>setForm(f=>({...f,litros:e.target.value}))} placeholder="Calculado automaticamente"/>
                </div>
              </div>
              <div className="km-row">
                <div className="form-group">
                  <label>R$/Litro</label>
                  <input type="number" inputMode="decimal" step="0.01" value={form.preco_litro}
                    onChange={e=>{
                      const preco = parseFloat(e.target.value);
                      const total = parseFloat(form.valor_abast);
                      setForm(f=>({...f, preco_litro:e.target.value,
                        litros: (preco > 0 && total > 0) ? (total / preco).toFixed(2) : f.litros
                      }));
                    }} placeholder="Ex: 6.89"/>
                </div>
                <div className="form-group">
                  <label>Valor Total R$</label>
                  <input type="number" inputMode="decimal" step="0.01" value={form.valor_abast}
                    onChange={e=>{
                      const total = parseFloat(e.target.value);
                      const preco = parseFloat(form.preco_litro);
                      setForm(f=>({...f, valor_abast:e.target.value,
                        litros: (preco > 0 && total > 0) ? (total / preco).toFixed(2) : f.litros
                      }));
                    }} placeholder="Ex: 244.90"/>
                </div>
              </div>
              <div className="form-group">
                <label>Nome do Posto</label>
                <input type="text" value={form.posto}
                  onChange={e=>setForm(f=>({...f,posto:e.target.value}))} placeholder="Ex: Posto Shell Centro"/>
              </div>
              <div className="divider"/>
              <FuelGauge value={form.nivel_abast_depois}
                onChange={v=>setForm(f=>({...f,nivel_abast_depois:v}))}
                label="Nível após abastecer"/>
            </>
          )}
        </div>

        {/* Fuel end */}
        <div className="card">
          <div className="card-title"><span/>Nível de Combustível — Fim do Dia</div>
          <FuelGauge value={form.nivel_fim} onChange={v=>setForm(f=>({...f,nivel_fim:v}))} label="Como está ao entregar o veículo"/>
        </div>

        {/* Error + Submit */}
        {error && <div className="error-msg">⚠️ {error}</div>}
        <button className="btn-primary" disabled={submitting} onClick={handleSubmit}>
          {submitting ? '⏳ Enviando para planilha...' : '✅ Finalizar e Enviar'}
        </button>
        <button className="btn-ghost" onClick={onBack}>← Trocar veículo</button>
      </div>
    </div>
  );
}

// ── Screen 4: Success ─────────────────────────────────────────────────────────
function SuccessScreen({driverName, vehicle, onNewDay}) {
  const veh = VEICULOS.find(v=>v.placa===vehicle)||{};
  return (
    <div className="screen">
      <div className="success-screen">
        <div className="success-icon">✅</div>
        <h2>Registro Enviado!</h2>
        <p><strong>{driverName}</strong><br/>{veh.emoji} {veh.nome} ({vehicle})</p>
        <p style={{marginTop:'12px',fontSize:'13px'}}>
          Os dados foram salvos na planilha da Penta Engenharia.
        </p>
        <button className="btn-secondary" style={{marginTop:'32px'}} onClick={onNewDay}>
          Novo Registro
        </button>
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [screen,  setScreen]  = useState('cpf');
  const [driver,  setDriver]  = useState(null);
  const [vehicle, setVehicle] = useState(null);
  const [sessaoIniciada, setSessaoIniciada] = useState(() => !!localStorage.getItem(SESSAO_KEY));

  // Sync config (veiculos/motoristas) from Apps Script on mount
  useEffect(() => {
    if (sessionStorage.getItem('cfg_synced') === '1') { sessionStorage.removeItem('cfg_synced'); return; }
    fetch(SCRIPT_URL + '?action=getConfig')
      .then(r => r.json())
      .then(d => {
        let changed = false;
        if (d.veiculos && d.veiculos.length && JSON.stringify(d.veiculos) !== localStorage.getItem('penta_carros')) {
          localStorage.setItem('penta_carros', JSON.stringify(d.veiculos));
          changed = true;
        }
        if (d.motoristas && d.motoristas.length && JSON.stringify(d.motoristas) !== localStorage.getItem('penta_motoristas')) {
          localStorage.setItem('penta_motoristas', JSON.stringify(d.motoristas));
          changed = true;
        }
        if (changed) { sessionStorage.setItem('cfg_synced', '1'); window.location.reload(); }
      })
      .catch(() => {});
  }, []);

  // Auto-login if same day — restore journey in progress
  useEffect(()=>{
    try {
      const s = localStorage.getItem(DRIVER_KEY);
      if(s) {
        const d = JSON.parse(s);
        if(d.date===todayStr()) {
          setDriver(d);
          // If there's a session in progress, jump to vehicle screen to show resume
          const sid = localStorage.getItem(SESSAO_KEY);
          if(sid) {
            const fs = localStorage.getItem(FORM_KEY);
            if(fs) {
              const fp = JSON.parse(fs);
              if(fp.date===todayStr() && fp.vehicle && fp.driver===d.name) {
                setVehicle(fp.vehicle);
                setScreen('form');
                return;
              }
            }
            setScreen('vehicle');
            return;
          }
          // If there's a form in progress for today, jump straight to it
          const fs = localStorage.getItem(FORM_KEY);
          if(fs) {
            const fp = JSON.parse(fs);
            if(fp.date===todayStr() && fp.vehicle && fp.driver===d.name) {
              setVehicle(fp.vehicle);
              setScreen('form');
              return;
            }
          }
          setScreen('vehicle');
        }
      }
    } catch(e){}
  },[]);

  const handleIdentify = (name, cpf) => {
    const d = {name, cpf, date:todayStr()};
    setDriver(d);
    setScreen('vehicle');
  };

  return (
    <div>
      <Header driverName={driver?.name} vehicle={vehicle}/>
      {screen==='cpf'     && <CPFScreen onDone={handleIdentify}/>}
      {screen==='vehicle' && <VehicleScreen driverName={driver?.name}
        sessaoIniciada={sessaoIniciada}
        onRetomar={()=>setScreen('form')}
        onDone={(v, sid)=>{setVehicle(v); setSessaoIniciada(true); setScreen('form');}}
        onBack={()=>setScreen('cpf')}/>}
      {screen==='form'    && <FormScreen driverName={driver?.name} vehicle={vehicle}
        onSubmit={()=>{ setSessaoIniciada(false); setScreen('success'); }}
        onBack={()=>setScreen('vehicle')}
        onRestart={()=>{
          setSessaoIniciada(false);
          setDriver(null);
          setVehicle(null);
          try { localStorage.removeItem(DRIVER_KEY); localStorage.removeItem(FORM_KEY); localStorage.removeItem(SESSAO_KEY); } catch(e){}
          setScreen('cpf');
        }}/>}
      {screen==='success' && <SuccessScreen driverName={driver?.name} vehicle={vehicle}
        onNewDay={()=>{setVehicle(null);setSessaoIniciada(false);setScreen('vehicle');}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
